<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Agent Office — Retro Top-Down</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f23;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Press Start 2P', monospace;
    padding: 8px;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .game-container {
    background: #16213e;
    border: 3px solid #e94560;
    border-radius: 6px;
    padding: 10px;
    box-shadow: 0 0 15px rgba(233,69,96,0.25), inset 0 0 30px rgba(0,0,0,0.4);
    position: relative;
    width: 100%;
    max-width: 820px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    margin-bottom: 8px;
    background: #0f3460;
    border: 2px solid #e94560;
    border-radius: 4px;
  }

  .title {
    color: #e94560;
    font-size: clamp(8px, 2.5vw, 12px);
    text-shadow: 2px 2px #0f0f23;
    letter-spacing: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .title .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .agent-count {
    color: #53d769;
    font-size: clamp(6px, 2vw, 10px);
    white-space: nowrap;
  }

  .game-screen {
    position: relative;
    border: 3px solid #e94560;
    border-radius: 4px;
    background: #0f0f23;
    overflow: hidden;
    aspect-ratio: 4 / 3;
    width: 100%;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    -ms-interpolation-mode: nearest-neighbor;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: stretch;
  }

  .task-input {
    flex: 1;
    min-width: 0;
    background: #0f3460;
    border: 2px solid #533483;
    border-radius: 4px;
    padding: 12px 14px;
    color: #e94560;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.5vw, 10px);
    outline: none;
    -webkit-appearance: none;
  }
  .task-input::placeholder { color: #533483; }
  .task-input:focus { border-color: #e94560; }

  .btn {
    background: #e94560;
    border: none;
    border-radius: 4px;
    padding: 12px 20px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.5vw, 10px);
    cursor: pointer;
    transition: all 0.1s;
    text-shadow: 1px 1px #0f0f23;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .btn:hover { background: #ff6b81; }
  .btn:active { transform: scale(0.94); background: #c23850; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    padding: 6px 10px;
    background: #0f3460;
    border: 1px solid #533483;
    border-radius: 4px;
    font-size: clamp(6px, 1.8vw, 8px);
    color: #a0a0c0;
    flex-wrap: wrap;
  }
  .status-bar .highlight { color: #f0e68c; }

  @media (max-height: 500px) {
    body { padding: 4px; }
    .game-container { padding: 6px; }
    .header { padding: 4px 8px; margin-bottom: 4px; }
    .controls { margin-top: 6px; gap: 4px; }
    .task-input { padding: 8px 10px; }
    .btn { padding: 8px 14px; }
    .status-bar { margin-top: 4px; padding: 4px 8px; }
    .game-screen { border-width: 2px; }
  }

  @media (max-width: 360px) {
    .controls { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
  }

  /* Result overlay */
  .result-overlay {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
    padding: 16px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .result-overlay.show {
    display: flex;
  }
  .result-title {
    color: #f0e68c;
    font-size: clamp(8px, 2vw, 12px);
    margin-bottom: 8px;
    text-shadow: 2px 2px #0f0f23;
  }
  .result-winner {
    color: #53d769;
    font-size: clamp(14px, 4vw, 24px);
    margin-bottom: 4px;
    text-shadow: 2px 2px #0f0f23;
  }
  .result-score {
    color: #e94560;
    font-size: clamp(10px, 3vw, 16px);
    margin-bottom: 8px;
  }
  .result-analysis {
    color: #a0a0c0;
    font-size: clamp(7px, 1.8vw, 10px);
    line-height: 1.6;
    max-width: 90%;
  }
  .result-dismiss {
    margin-top: 12px;
    background: #e94560;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(6px, 1.5vw, 8px);
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="title">AI AGENT OFFICE <span class="blink">▌</span></div>
    <div class="agent-count" id="agentCountDisplay">AGENTS: 0</div>
  </div>

  <div class="game-screen">
    <canvas id="officeCanvas" width="800" height="600"></canvas>
    <div class="result-overlay" id="resultOverlay">
      <div class="result-title">── MAIN AGENT REPORT ──</div>
      <div class="result-winner" id="resultWinner"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-analysis" id="resultAnalysis"></div>
      <button class="result-dismiss" id="resultDismiss">✕ DISMISS</button>
    </div>
  </div>

  <div class="controls">
    <input type="text" class="task-input" id="taskInput"
      placeholder="ENTER TASK..." maxlength="120"
      autocomplete="off" spellcheck="false">
    <button class="btn" id="sendBtn">⏎ GO</button>
  </div>

  <div class="status-bar">
    <span id="statusText">🟢 READY</span>
    <span class="highlight" id="activityText"></span>
  </div>
</div>

<script>
(function() {
  const CANVAS_W = 800, CANVAS_H = 600;
  const COLS = 20, ROWS = 15;
  const TILE = 40;

  const STATE_URL = 'https://raw.githubusercontent.com/memelya/New-repository/main/state.json';

  const AGENTS = [
    { name: 'CLAUDE', color: '#d4a574', hair: '#8b5e3c', deskCol: 2, deskRow: 2, role: 'Analyst' },
    { name: 'GPT',    color: '#74b9ff', hair: '#2d6da8', deskCol: 6, deskRow: 2, role: 'Strategist' },
    { name: 'GEMINI', color: '#a8e6cf', hair: '#3b8c6e', deskCol: 10, deskRow: 2, role: 'Statistician' },
    { name: 'LOUIS',  color: '#e17055', hair: '#a0402f', deskCol: 14, deskRow: 2, role: 'Main Agent' },
    { name: 'MISTRAL', color: '#c490d4', hair: '#7b4d8a', deskCol: 4, deskRow: 9, role: 'Scout' },
    { name: 'LLAMA',  color: '#f8d49a', hair: '#b8860b', deskCol: 8, deskRow: 9, role: 'Data Miner' },
    { name: 'DEEPSEEK',color:'#81ecec', hair: '#00b894', deskCol: 12, deskRow: 9, role: 'Tactician' },
    { name: 'COPILOT',color: '#b0b0ff', hair: '#5050a0', deskCol: 16, deskRow: 9, role: 'Researcher' },
  ];

  // ─── STATE ───────────────────────────────────────────────
  const canvas = document.getElementById('officeCanvas');
  const ctx = canvas.getContext('2d');
  const resultOverlay = document.getElementById('resultOverlay');

  let agents = [];
  let frame = 0;
  let isRunning = false;
  let lastVersion = 0;
  let state = null;
  let animationQueue = [];
  let taskHistory = [];

  // ─── AGENT CLASS ─────────────────────────────────────────
  class Agent {
    constructor(cfg, idx) {
      this.idx = idx;
      this.name = cfg.name;
      this.color = cfg.color;
      this.hair = cfg.hair;
      this.role = cfg.role;
      this.homeX = cfg.deskCol + 0.5;
      this.homeY = cfg.deskRow + 0.5;
      this.x = this.homeX;
      this.y = this.homeY;
      this.targetX = this.x;
      this.targetY = this.y;
      this.moving = false;
      this.path = [];
      this.pathIndex = 0;
      this.speed = 0.04;
      this.walkCycle = 0;
      this.dir = 0;
      this.dialogue = null;
      this.dialogueTimer = 0;
      this.oscilate = 0;
    }

    setTarget(gx, gy) {
      this.targetX = gx;
      this.targetY = gy;
      this.path = this.findPath(Math.floor(this.x), Math.floor(this.y), Math.floor(gx), Math.floor(gy));
      this.pathIndex = 0;
      this.moving = true;
    }

    findPath(sx, sy, ex, ey) {
      if (sx === ex && sy === ey) return [];
      const visited = new Set();
      const queue = [{ x: sx, y: sy, path: [] }];
      while (queue.length > 0) {
        const { x, y, path } = queue.shift();
        if (x === ex && y === ey) return path;
        const key = `${x},${y}`;
        if (visited.has(key)) continue;
        visited.add(key);
        for (const [dx, dy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
          if (isOccupied(nx, ny, this)) continue;
          const nkey = `${nx},${ny}`;
          if (visited.has(nkey)) continue;
          queue.push({ x: nx, y: ny, path: [...path, { x: nx, y: ny }] });
        }
      }
      return [];
    }

    goHome() { this.setTarget(this.homeX, this.homeY); }

    say(text, duration) {
      this.dialogue = text;
      this.dialogueTimer = duration || 200;
    }

    update() {
      this.oscilate += 0.02;
      if (this.moving) {
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (Math.abs(dx) > Math.abs(dy)) this.dir = dx > 0 ? 2 : 1;
        else this.dir = dy > 0 ? 0 : 3;
        if (dist > 0.15) {
          this.x += (dx / dist) * this.speed;
          this.y += (dy / dist) * this.speed;
          this.walkCycle += 0.08;
        } else {
          this.x = this.targetX;
          this.y = this.targetY;
          this.moving = false;
          this.walkCycle = 0;
          if (this.pathIndex < this.path.length) {
            const next = this.path[this.pathIndex++];
            this.targetX = next.x + 0.5;
            this.targetY = next.y + 0.5;
            this.moving = true;
          }
        }
      }
      if (this.dialogue) {
        this.dialogueTimer--;
        if (this.dialogueTimer <= 0) this.dialogue = null;
      }
    }

    draw(ctx) {
      const px = this.x * TILE;
      const py = this.y * TILE;
      const s = TILE;
      const idleBob = this.moving ? 0 : Math.sin(this.oscilate) * 1.0;
      const wobble = this.moving ? Math.sin(this.walkCycle * Math.PI * 2) * 2 : idleBob;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(px, py + s*0.35, s*0.22, s*0.07, 0, 0, Math.PI*2);
      ctx.fill();

      // Body
      const bodyW = s * 0.42, bodyH = s * 0.32;
      const bpx = px - bodyW/2, bpy = py - s*0.33 + wobble;
      ctx.fillStyle = this.color;
      ctx.fillRect(bpx, bpy, bodyW, bodyH);
      ctx.strokeStyle = 'rgba(0,0,0,0.6)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(bpx, bpy, bodyW, bodyH);

      // Head
      const headR = s * 0.16;
      ctx.fillStyle = '#f0c8a0';
      ctx.beginPath();
      ctx.arc(px, py - s*0.33 - headR + wobble, headR, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();

      // Hair
      ctx.fillStyle = this.hair;
      ctx.fillRect(px - headR, py - s*0.33 - headR*2 + wobble, headR*2, headR*0.7);
      ctx.strokeRect(px - headR, py - s*0.33 - headR*2 + wobble, headR*2, headR*0.7);

      // Eyes
      const eyeY = py - s*0.33 - headR*0.15 + wobble;
      ctx.fillStyle = '#333';
      ctx.fillRect(px - 3.5, eyeY, 2.5, 2.5);
      ctx.fillRect(px + 1.5, eyeY, 2.5, 2.5);

      // Legs when walking
      if (this.moving) {
        ctx.fillStyle = '#333';
        const legOff = Math.sin(this.walkCycle * Math.PI * 2) * 2.5;
        ctx.fillRect(px - 5, py + wobble, 3.5, 5 + legOff);
        ctx.fillRect(px + 1.5, py + wobble, 3.5, 5 - legOff);
      }

      // Label background
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(px - 22, py + 5, 44, 11);
      ctx.fillStyle = '#fff';
      ctx.font = '6px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.name, px, py + 10);
      ctx.textBaseline = 'alphabetic';

      // Dialogue
      if (this.dialogue) {
        const lines = this.dialogue.split('\n');
        const bubH = Math.max(28, lines.length * 11 + 8);
        const bubW = 105;
        const bubX = px - bubW/2;
        const bubY = py - s*0.6 - bubH - 6 + wobble;

        ctx.fillStyle = 'rgba(30,30,50,0.85)';
        ctx.beginPath();
        ctx.roundRect(bubX + 2, bubY + 2, bubW, bubH, 4);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,252,0.95)';
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(bubX, bubY, bubW, bubH, 4);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,252,0.95)';
        ctx.beginPath();
        ctx.moveTo(px - 4, bubY + bubH);
        ctx.lineTo(px, bubY + bubH + 5);
        ctx.lineTo(px + 4, bubY + bubH);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#1a1a2e';
        ctx.font = 'bold 6px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        lines.forEach((line, i) => ctx.fillText(line, px, bubY + 7 + i * 11));
        ctx.textBaseline = 'alphabetic';
      }
    }
  }

  // ─── HELPERS ─────────────────────────────────────────────
  function isOccupied(col, row, exclude) {
    return agents.some(a => a !== exclude && Math.floor(a.x) === col && Math.floor(a.y) === row);
  }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // ─── DRAWING ─────────────────────────────────────────────
  function drawFloor() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        const dark = (r + c) % 2 === 0;
        ctx.fillStyle = dark ? '#2a2a4a' : '#222244';
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.strokeRect(c * TILE, r * TILE, TILE, TILE);
      }
  }

  function drawWalls() {
    ctx.fillStyle = '#1a1a3e';
    ctx.fillRect(0, 0, CANVAS_W, 4); ctx.fillRect(0, ROWS * TILE - 4, CANVAS_W, 4);
    ctx.fillRect(0, 0, 4, ROWS * TILE); ctx.fillRect(COLS * TILE - 4, 0, 4, ROWS * TILE);
    ctx.fillStyle = '#e94560';
    [[0,0],[CANVAS_W-8,0],[0,ROWS*TILE-8],[CANVAS_W-8,ROWS*TILE-8]]
      .forEach(([x,y]) => ctx.fillRect(x, y, 8, 8));
  }

  function drawDesk(col, row) {
    const x = col * TILE, y = row * TILE, pad = 4;
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(x + pad, y + pad, TILE - pad*2, TILE - pad*2);
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x + pad, y + pad, TILE - pad*2, TILE - pad*2);
    const monW = 16, monH = 10, mx = x + (TILE - monW) / 2, my = y + pad + 4;
    ctx.fillStyle = '#666';
    ctx.fillRect(mx + 5, my + monH - 1, 6, 3);
    ctx.fillStyle = '#0a0a2e';
    ctx.fillRect(mx, my, monW, monH - 1);
    ctx.strokeStyle = '#444';
    ctx.strokeRect(mx, my, monW, monH - 1);
    ctx.fillStyle = 'rgba(100,200,255,0.08)';
    ctx.fillRect(mx + 2, my + 2, monW - 4, monH - 5);
    ctx.fillStyle = '#444';
    ctx.fillRect(x + TILE - 8, y + TILE - 5, 6, 4);
  }

  function drawDecor() {
    [[0,0],[COLS-1,0],[0,ROWS-1],[COLS-1,ROWS-1]].forEach(([c,r]) => {
      const x = c * TILE + TILE/2, y = r * TILE + TILE/2;
      ctx.fillStyle = '#8d6e63';
      ctx.fillRect(x - 5, y + 3, 10, 8);
      ctx.strokeStyle = '#5d4037';
      ctx.strokeRect(x - 5, y + 3, 10, 8);
      ctx.fillStyle = '#4caf50';
      for (let i = 0; i < 5; i++) {
        const a = i * 1.2;
        ctx.fillRect(x + Math.cos(a) * 5 - 1.5, y - 3 + Math.sin(a) * 5 - 1.5, 3, 5);
      }
    });
    // Water cooler
    ctx.fillStyle = '#4fc3f7';
    ctx.fillRect(18*TILE+6, 7*TILE+6, 10, 14);
    ctx.fillStyle = '#0288d1';
    ctx.fillRect(18*TILE+7, 7*TILE+8, 8, 2);
    ctx.fillStyle = '#fff';
    ctx.fillRect(18*TILE+9, 7*TILE+13, 4, 5);
  }

  // ─── STATE POLLING ───────────────────────────────────────
  async function pollState() {
    try {
      const resp = await fetch(STATE_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const newState = await resp.json();
      if (newState.version > lastVersion) {
        lastVersion = newState.version;
        onNewState(newState);
      }
    } catch (e) {
      // Silent fail, retry on next interval
    }
  }

  function onNewState(s) {
    state = s;
    document.getElementById('statusText').textContent =
      s.phase === 'idle' ? '\uD83D\uDFE2 READY' :
      s.phase === 'task_received' ? '\uD83D\uDCE5 TASK RECEIVED' :
      s.phase === 'walking' ? '\uD83D\uDEB6 AGENTS MOVING' :
      s.phase === 'discussing' ? '\uD83D\uDCAC DISCUSSING...' :
      s.phase === 'result' ? '\uD83D\uDCCA RESULT READY' :
      s.phase === 'complete' ? '\u2705 COMPLETE' : '\uD83D\uDFE2 READY';

    if (s.task) {
      taskHistory.push(s.task);
      if (taskHistory.length > 20) taskHistory.shift();
    }
    document.getElementById('activityText').textContent = s.task ? '▶ ' + s.task : '';

    // Process state
    if (s.phase === 'task_received' || s.phase === 'walking') {
      if (s.meeting_point) {
        agents.forEach(a => {
          const ag = s.agent_states && s.agent_states[a.name];
          if (ag && ag.target) {
            a.setTarget(ag.target.x, ag.target.y);
          } else if (s.phase === 'walking') {
            a.setTarget(s.meeting_point.x + 0.5, s.meeting_point.y + 0.5);
          }
        });
      }
    }

    if (s.phase === 'discussing' && s.agent_states) {
      Object.entries(s.agent_states).forEach(([name, ag]) => {
        const agent = agents.find(a => a.name === name);
        if (agent && ag.dialogue) {
          agent.say(ag.dialogue, ag.duration || 200);
        }
      });
    }

    if (s.phase === 'complete' || s.phase === 'result') {
      agents.forEach(a => a.goHome());
      if (s.result) {
        showResult(s.result);
      }
    }
  }

  function showResult(result) {
    document.getElementById('resultWinner').textContent = result.winner || '';
    document.getElementById('resultScore').textContent = result.score || '';
    document.getElementById('resultAnalysis').textContent = result.analysis || '';
    resultOverlay.classList.add('show');
    if (result.highlight_agent) {
      const agent = agents.find(a => a.name === result.highlight_agent);
      if (agent) agent.say("Here's my report!", 300);
    }
  }

  // ─── ANIMATION LOOP ──────────────────────────────────────
  function update() {
    frame++;
    agents.forEach(a => a.update());
  }

  function draw() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawFloor();
    drawWalls();
    agents.forEach(a => drawDesk(Math.floor(a.homeX), Math.floor(a.homeY)));
    drawDecor();

    const sorted = [...agents].sort((a, b) => a.y - b.y);
    sorted.forEach(a => a.draw(ctx));

    // Task indicator
    if (taskHistory.length > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(4, ROWS * TILE - 20, CANVAS_W - 8, 18);
      ctx.fillStyle = '#f0e68c';
      ctx.font = '7px monospace';
      ctx.textAlign = 'left';
      const t = taskHistory[taskHistory.length - 1];
      ctx.fillText('▶ ' + (t.length > 40 ? t.substring(0, 38) + '..' : t), 10, ROWS * TILE - 8);
    }

    // Phase indicator
    if (state && state.phase !== 'idle' && state.phase !== 'complete') {
      ctx.fillStyle = '#e94560';
      ctx.font = '7px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(state.phase.toUpperCase(), CANVAS_W - 8, 14);
    }

    // Vignette
    const grad = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, CANVAS_H*0.5, CANVAS_W/2, CANVAS_H/2, CANVAS_H);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // ─── INIT ────────────────────────────────────────────────
  function init() {
    agents = AGENTS.map((cfg, idx) => new Agent(cfg, idx));
    document.getElementById('agentCountDisplay').textContent = 'AGENTS: ' + AGENTS.length;

    document.getElementById('resultDismiss').addEventListener('click', () => {
      resultOverlay.classList.remove('show');
    });

    // Poll state every 3 seconds
    setInterval(pollState, 3000);
    pollState();

    gameLoop();
  }

  // Canvas roundRect polyfill
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (r > w/2) r = w/2;
      if (r > h/2) r = h/2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      this.closePath();
      return this;
    };
  }

  document.addEventListener('DOMContentLoaded', init);
  if (document.readyState !== 'loading') init();
})();
</script>
