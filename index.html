<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Agent Office — Retro Top-Down</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0f0f23; display:flex; justify-content:center; align-items:flex-start;
    min-height:100vh; min-height:100dvh; font-family:'Press Start 2P',monospace;
    padding:8px; overflow-x:hidden;
  }
  body::after {
    content:''; position:fixed; top:0; left:0; right:0; bottom:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    pointer-events:none; z-index:100;
  }
  .game-container {
    background:#16213e; border:3px solid #e94560; border-radius:6px; padding:10px;
    box-shadow:0 0 15px rgba(233,69,96,0.25),inset 0 0 30px rgba(0,0,0,0.4);
    position:relative; width:100%; max-width:820px;
  }
  .header {
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 10px; margin-bottom:8px; background:#0f3460;
    border:2px solid #e94560; border-radius:4px;
  }
  .title {
    color:#e94560; font-size:clamp(8px,2.5vw,12px);
    text-shadow:2px 2px #0f0f23; letter-spacing:1px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .title .blink { animation:blink 1s step-end infinite; }
  @keyframes blink { 50%{opacity:0;} }
  .agent-count { color:#53d769; font-size:clamp(6px,2vw,10px); white-space:nowrap; }
  .game-screen {
    position:relative; border:3px solid #e94560; border-radius:4px;
    background:#0f0f23; overflow:hidden; aspect-ratio:4/3; width:100%;
  }
  canvas { display:block; width:100%; height:100%; image-rendering:pixelated; image-rendering:crisp-edges; }
  .controls {
    display:flex; gap:8px; margin-top:10px; align-items:stretch;
  }
  .task-input {
    flex:1; min-width:0; background:#0f3460; border:2px solid #533483; border-radius:4px;
    padding:12px 14px; color:#e94560; font-family:'Press Start 2P',monospace;
    font-size:clamp(8px,2.5vw,10px); outline:none; -webkit-appearance:none;
  }
  .task-input::placeholder { color:#533483; }
  .task-input:focus { border-color:#e94560; }
  .btn {
    background:#e94560; border:none; border-radius:4px; padding:12px 20px;
    color:#fff; font-family:'Press Start 2P',monospace;
    font-size:clamp(8px,2.5vw,10px); cursor:pointer; transition:all 0.1s;
    text-shadow:1px 1px #0f0f23; touch-action:manipulation;
    -webkit-tap-highlight-color:transparent; flex-shrink:0;
  }
  .btn:hover { background:#ff6b81; }
  .btn:active { transform:scale(0.94); background:#c23850; }
  .status-bar {
    display:flex; gap:12px; margin-top:8px; padding:6px 10px;
    background:#0f3460; border:1px solid #533483; border-radius:4px;
    font-size:clamp(6px,1.8vw,8px); color:#a0a0c0; flex-wrap:wrap;
  }
  .status-bar .highlight { color:#f0e68c; }
  .result-overlay {
    display:none; position:absolute; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.78); z-index:50; padding:16px;
    flex-direction:column; align-items:center; justify-content:center; text-align:center;
  }
  .result-overlay.show { display:flex; }
  .result-title { color:#f0e68c; font-size:clamp(8px,2vw,12px); margin-bottom:8px; text-shadow:2px 2px #0f0f23; }
  .result-winner { color:#53d769; font-size:clamp(14px,4vw,24px); margin-bottom:4px; text-shadow:2px 2px #0f0f23; }
  .result-score { color:#e94560; font-size:clamp(10px,3vw,16px); margin-bottom:8px; }
  .result-analysis { color:#a0a0c0; font-size:clamp(7px,1.8vw,10px); line-height:1.6; max-width:90%; }
  .result-dismiss { margin-top:12px; background:#e94560; border:none; border-radius:4px; padding:8px 16px; color:#fff; font-family:'Press Start 2P',monospace; font-size:clamp(6px,1.5vw,8px); cursor:pointer; }

  .res-board {
    margin-top:8px; padding:8px 12px;
    background:#0f3460; border:2px solid #533483; border-radius:4px;
    font-size:clamp(7px,1.8vw,9px);
    display:none;
  }
  .res-board.show { display:block; }
  .res-board .rb-title { color:#f0e68c; font-size:clamp(6px,1.5vw,8px); margin-bottom:6px; }
  .res-board table { width:100%; border-collapse:collapse; }
  .res-board td { padding:3px 6px; color:#a0a0c0; vertical-align:top; }
  .res-board td.label { color:#e94560; white-space:nowrap; width:1%; padding-right:12px; }
  .res-board td.val { color:#fff; }
  .res-board .bet { color:#53d769; font-weight:bold; }
  @media (max-height:500px) {
    body { padding:4px; }
    .game-container { padding:6px; } .header { padding:4px 8px; margin-bottom:4px; }
    .controls { margin-top:6px; gap:4px; } .task-input { padding:8px 10px; }
    .btn { padding:8px 14px; } .status-bar { margin-top:4px; padding:4px 8px; }
    .game-screen { border-width:2px; }
  }
  @media (max-width:360px) {
    .controls { flex-direction:column; } .btn { width:100%; text-align:center; }
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <div class="title">AI AGENT OFFICE <span class="blink">▌</span></div>
    <div class="agent-count" id="agentCountDisplay">AGENTS: 0</div>
  </div>
  <div class="game-screen">
    <canvas id="officeCanvas" width="800" height="600"></canvas>
    <div class="result-overlay" id="resultOverlay">
      <div class="result-title">── MAIN AGENT REPORT ──</div>
      <div class="result-winner" id="resultWinner"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-analysis" id="resultAnalysis"></div>
      <button class="result-dismiss" id="resultDismiss">✕ DISMISS</button>
    </div>
  </div>
  <div class="controls">
    <input type="text" class="task-input" id="taskInput" placeholder="ENTER TASK..." maxlength="120" autocomplete="off" spellcheck="false">
    <button class="btn" id="sendBtn">⏎ GO</button>
  </div>
  <div class="status-bar">
    <span id="statusText">🟢 READY</span>
    <span class="highlight" id="activityText"></span>
  </div>
  <div class="res-board" id="resBoard">
    <div class="rb-title">── LAST ANALYSIS ──</div>
    <table>
      <tr><td class="label">TOURNAMENT</td><td class="val" id="rbTournament">—</td></tr>
      <tr><td class="label">TEAMS</td><td class="val" id="rbTeams">—</td></tr>
      <tr><td class="label">PREDICTION</td><td class="val" id="rbPrediction">—</td></tr>
      <tr><td class="label">REC. BET</td><td class="val bet" id="rbBet">—</td></tr>
    </table>
  </div>
</div>

<script>
(function() {
  const W=800, H=600, COLS=20, ROWS=15, T=40;
  const STATE_URL = 'https://raw.githubusercontent.com/memelya/New-repository/main/state.json';

  // ─── AGENTS ──────────────────────────────────────────────
  const AGENT_CFG = [
    {n:'CLAUDE',c:'#d4a574',h:'#8b5e3c',dx:2,dy:2,r:'Analyst'},
    {n:'GPT',c:'#74b9ff',h:'#2d6da8',dx:6,dy:2,r:'Strategist'},
    {n:'GEMINI',c:'#a8e6cf',h:'#3b8c6e',dx:10,dy:2,r:'Statistician'},
    {n:'LOUIS',c:'#e17055',h:'#a0402f',dx:14,dy:2,r:'Main Agent'},
    {n:'MISTRAL',c:'#c490d4',h:'#7b4d8a',dx:4,dy:9,r:'Scout'},
    {n:'LLAMA',c:'#f8d49a',h:'#b8860b',dx:8,dy:9,r:'Data Miner'},
    {n:'DEEPSEEK',c:'#81ecec',h:'#00b894',dx:12,dy:9,r:'Tactician'},
    {n:'COPILOT',c:'#b0b0ff',h:'#5050a0',dx:16,dy:9,r:'Researcher'},
  ];

  const DISCUSSIONS = [
    'Hmm, let me\nanalyze this...','I think we need\nmore context.',
    'What about the\narchitecture?','Good point!\nLet me check...',
    'I can handle\nthe frontend.','Backend needs\na rethink.',
    'The data layer\nis the key.','Let me review\nthe requirements.',
    'Security first,\nthen features.','Deploy strategy\nneeds planning.',
    'Wait, let me\nre-read the task.','Testing should\nbe automated.',
    "I'll handle the\ndatabase schema.","Let's keep it\nsimple for now.",
    'Edge cases?\nLet me think...','Performance is\na priority.',
  ];

  const MEETINGS = [{c:5,r:5},{c:14,r:5},{c:10,r:12},{c:3,r:12},{c:9,r:7}];
  let meetIdx = 0;

  // ─── STATE ───────────────────────────────────────────────
  const cv = document.getElementById('officeCanvas');
  const cx = cv.getContext('2d');
  const ro = document.getElementById('resultOverlay');

  let agents = [], frame = 0, isRunning = false, lastV = 0, mode = 'local';
  let taskHist = [], state = null, lastResult = null;

  // ─── AGENT CLASS ─────────────────────────────────────────
  class A {
    constructor(cfg,i) {
      this.i=i; this.n=cfg.n; this.c=cfg.c; this.h=cfg.h; this.r=cfg.r;
      this.hx=cfg.dx+.5; this.hy=cfg.dy+.5;
      this.x=this.hx; this.y=this.hy;
      this.tx=this.x; this.ty=this.y;
      this.mv=false; this.pth=[]; this.pi=0;
      this.sp=0.04; this.wc=0; this.dr=0;
      this.dl=null; this.dt=0; this.os=0;
    }
    go(gx,gy) {
      this.tx=gx; this.ty=gy;
      this.pth=this._fp(Math.floor(this.x),Math.floor(this.y),Math.floor(gx),Math.floor(gy));
      this.pi=0; this.mv=true;
    }
    home() { this.go(this.hx,this.hy); }
    _fp(sx,sy,ex,ey) {
      if(sx===ex&&sy===ey) return [];
      let v=new Set(), q=[{x:sx,y:sy,p:[]}];
      while(q.length) {
        let {x,y,p}=q.shift();
        if(x===ex&&y===ey) return p;
        let k=x+','+y; if(v.has(k)) continue; v.add(k);
        for(let[dxx,dyy] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          let nx=x+dxx, ny=y+dyy;
          if(nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
          if(A._occ(nx,ny,this)) continue;
          if(v.has(nx+','+ny)) continue;
          q.push({x:nx,y:ny,p:[...p,{x:nx,y:ny}]});
        }
      } return [];
    }
    static _occ(c,r,e) { return agents.some(a=>a!==e&&Math.floor(a.x)===c&&Math.floor(a.y)===r); }
    say(t,d) { this.dl=t; this.dt=d||200; }
    upd() {
      this.os+=0.02;
      if(this.mv) {
        let dx=this.tx-this.x, dy=this.ty-this.y;
        let d=Math.sqrt(dx*dx+dy*dy);
        if(Math.abs(dx)>Math.abs(dy)) this.dr=dx>0?2:1; else this.dr=dy>0?0:3;
        if(d>.15) {
          this.x+=dx/d*this.sp; this.y+=dy/d*this.sp;
          this.wc+=0.08;
        } else {
          this.x=this.tx; this.y=this.ty; this.mv=false; this.wc=0;
          if(this.pi<this.pth.length) {
            let n=this.pth[this.pi++];
            this.tx=n.x+.5; this.ty=n.y+.5; this.mv=true;
          }
        }
      }
      if(this.dl) { this.dt--; if(this.dt<=0) this.dl=null; }
    }
    drw(ctx) {
      let px=this.x*T, py=this.y*T;
      let ib=this.mv?0:Math.sin(this.os)*1, wb=this.mv?Math.sin(this.wc*Math.PI*2)*2:ib;
      ctx.fillStyle='rgba(0,0,0,0.25)';
      ctx.beginPath(); ctx.ellipse(px,py+T*.35,T*.22,T*.07,0,0,Math.PI*2); ctx.fill();
      let bw=T*.42,bh=T*.32;
      let bpx=px-bw/2,bpy=py-T*.33+wb;
      ctx.fillStyle=this.c; ctx.fillRect(bpx,bpy,bw,bh);
      ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=1.5; ctx.strokeRect(bpx,bpy,bw,bh);
      let hr=T*.16;
      ctx.fillStyle='#f0c8a0'; ctx.beginPath(); ctx.arc(px,py-T*.33-hr+wb,hr,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=this.h; ctx.fillRect(px-hr,py-T*.33-hr*2+wb,hr*2,hr*.7); ctx.strokeRect(px-hr,py-T*.33-hr*2+wb,hr*2,hr*.7);
      let ey=py-T*.33-hr*.15+wb;
      ctx.fillStyle='#333'; ctx.fillRect(px-3.5,ey,2.5,2.5); ctx.fillRect(px+1.5,ey,2.5,2.5);
      if(this.mv) {
        ctx.fillStyle='#333'; let lo=Math.sin(this.wc*Math.PI*2)*2.5;
        ctx.fillRect(px-5,py+wb,3.5,5+lo); ctx.fillRect(px+1.5,py+wb,3.5,5-lo);
      }
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(px-22,py+5,44,11);
      ctx.fillStyle='#fff'; ctx.font='6px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(this.n,px,py+10); ctx.textBaseline='alphabetic';
      if(this.dl) {
        let ls=this.dl.split('\n'), bH=Math.max(28,ls.length*11+8), bW=105;
        let bX=px-bW/2, bY=py-T*.6-bH-6+wb;
        ctx.fillStyle='rgba(30,30,50,0.85)'; ctx.beginPath(); ctx.roundRect(bX+2,bY+2,bW,bH,4); ctx.fill();
        ctx.fillStyle='rgba(255,255,252,0.95)'; ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(bX,bY,bW,bH,4); ctx.fill(); ctx.stroke();
        ctx.fillStyle='rgba(255,255,252,0.95)';
        ctx.beginPath(); ctx.moveTo(px-4,bY+bH); ctx.lineTo(px,bY+bH+5); ctx.lineTo(px+4,bY+bH); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#1a1a2e'; ctx.font='bold 6px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ls.forEach((l,i)=>ctx.fillText(l,px,bY+7+i*11)); ctx.textBaseline='alphabetic';
      }
    }
  }

  // ─── DRAWING ─────────────────────────────────────────────
  function drwFloor() { for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) { let d=(r+c)%2===0; cx.fillStyle=d?'#2a2a4a':'#222244'; cx.fillRect(c*T,r*T,T,T); cx.strokeStyle='rgba(255,255,255,0.03)'; cx.strokeRect(c*T,r*T,T,T); } }
  function drwWalls() { cx.fillStyle='#1a1a3e'; cx.fillRect(0,0,W,4);cx.fillRect(0,ROWS*T-4,W,4);cx.fillRect(0,0,4,ROWS*T);cx.fillRect(COLS*T-4,0,4,ROWS*T); cx.fillStyle='#e94560'; [[0,0],[W-8,0],[0,ROWS*T-8],[W-8,ROWS*T-8]].forEach(([x,y])=>cx.fillRect(x,y,8,8)); }
  function drwDesk(c,r) { let x=c*T, y=r*T, p=4; cx.fillStyle='#5d4037'; cx.fillRect(x+p,y+p,T-p*2,T-p*2); cx.strokeStyle='#3e2723'; cx.lineWidth=1.5; cx.strokeRect(x+p,y+p,T-p*2,T-p*2); let mw=16,mh=10,mx=x+(T-mw)/2,my=y+p+4; cx.fillStyle='#666'; cx.fillRect(mx+5,my+mh-1,6,3); cx.fillStyle='#0a0a2e'; cx.fillRect(mx,my,mw,mh-1); cx.strokeStyle='#444'; cx.strokeRect(mx,my,mw,mh-1); cx.fillStyle='rgba(100,200,255,0.08)'; cx.fillRect(mx+2,my+2,mw-4,mh-5); cx.fillStyle='#444'; cx.fillRect(x+T-8,y+T-5,6,4); }
  function drwDecor() { [[0,0],[COLS-1,0],[0,ROWS-1],[COLS-1,ROWS-1]].forEach(([c,r])=>{let x=c*T+T/2,y=r*T+T/2; cx.fillStyle='#8d6e63'; cx.fillRect(x-5,y+3,10,8); cx.strokeStyle='#5d4037'; cx.strokeRect(x-5,y+3,10,8); cx.fillStyle='#4caf50'; for(let i=0;i<5;i++){let a=i*1.2;cx.fillRect(x+Math.cos(a)*5-1.5,y-3+Math.sin(a)*5-1.5,3,5);}}); cx.fillStyle='#4fc3f7'; cx.fillRect(18*T+6,7*T+6,10,14); cx.fillStyle='#0288d1'; cx.fillRect(18*T+7,7*T+8,8,2); cx.fillStyle='#fff'; cx.fillRect(18*T+9,7*T+13,4,5); }

  // ─── LOCAL DISCUSSION ────────────────────────────────────
  function localDiscussion(task) {
    mode='local'; isRunning=true; taskHist.push(task); if(taskHist.length>20) taskHist.shift();
    setStatus('🔄 PROCESSING...');
    let n=randInt(3,Math.min(4,AGENT_CFG.length));
    let sh=[...agents].sort(()=>Math.random()-.5);
    let pt=sh.slice(0,n);
    let mt=MEETINGS[meetIdx%MEETINGS.length]; meetIdx++;
    pt.forEach((a,i)=>{setTimeout(()=>{let ox=i%2*.6, oy=Math.floor(i/2)*.6; a.go(mt.c+1+ox,mt.r+1+oy);},i*400);});
    let td=n*400+2000;
    let ls=[`Task: \"${task.length>22?task.substr(0,20)+'..':task}\"`,'Interesting...'];
    for(let i=0;i<6;i++) ls.push(pick(DISCUSSIONS));
    ls.push('Agreed! 🤝'); ls.push("Let's do it! ⚡");
    pt.forEach((a,i)=>{setTimeout(()=>a.say(ls[i%ls.length],280),td+i*2000);});
    agents.filter(a=>!pt.includes(a)).forEach(a=>{setTimeout(()=>{if(Math.random()<.4)a.say('...',120);},td+rand(0,3000));});
    setTimeout(()=>setStatus('💬 DISCUSSING...'),td-500);
    setTimeout(()=>{setStatus('✅ COMPLETE');pt.forEach(a=>{setTimeout(()=>a.home(),rand(500,2000));});setTimeout(()=>{isRunning=false;setStatus('🟢 READY');},4000);},td+pt.length*2000+1000);
    updCount();
  }

  // ─── STATE POLLING ───────────────────────────────────────
  async function pollSt() {
    try {
      let r=await fetch(STATE_URL+'?t='+Date.now());
      if(!r.ok) return;
      let s=await r.json();
      if(s.version>lastV) { lastV=s.version; onState(s); }
    } catch(e) {}
  }

  function onState(s) {
    state=s; mode='remote'; isRunning=true;
    setStatus(s.phase==='idle'?'🟢 READY':s.phase==='task_received'?'📥 TASK RECEIVED':s.phase==='walking'?'🚶 AGENTS MOVING':s.phase==='discussing'?'💬 DISCUSSING...':s.phase==='result'?'📊 RESULT READY':s.phase==='complete'?'✅ COMPLETE':'🟢 READY');
    if(s.task&&s.task!=='null') { taskHist.push(s.task); if(taskHist.length>20) taskHist.shift(); }
    document.getElementById('activityText').textContent=s.task&&s.task!=='null'?'▶ '+s.task:'';
    if(s.phase==='walking'&&s.meeting_point) {
      agents.forEach(a=>a.go(s.meeting_point.x+.5,s.meeting_point.y+.5));
    }
    if(s.phase==='discussing'&&s.agent_states) {
      Object.entries(s.agent_states).forEach(([nm,ag])=>{
        let a=agents.find(x=>x.n===nm);
        if(a&&ag.dialogue)a.say(ag.dialogue,ag.duration||200);
      });
    }
    if(s.phase==='complete'||s.phase==='result') {
      agents.forEach(a=>a.home());
      if(s.result) showResult(s.result);
    }
    if(s.phase==='idle') {
      agents.forEach(a=>{if(Math.floor(a.x)===Math.floor(a.hx)&&Math.floor(a.y)===Math.floor(a.hy)){}else a.home();});
      isRunning=false;
      // Keep board from last result if no new result
      if(lastResult) updateBoard(lastResult);
    }
    updCount();
  }

  function showResult(r) {
    lastResult=r; // persist
    document.getElementById('resultWinner').textContent=r.winner||'';
    document.getElementById('resultScore').textContent=r.score||'';
    document.getElementById('resultAnalysis').textContent=r.analysis||'';
    ro.classList.add('show');
    updateBoard(r);
  }

  function updateBoard(r) {
    if(!r) return;
    const board=document.getElementById('resBoard');
    document.getElementById('rbTournament').textContent=r.tournament||'—';
    document.getElementById('rbTeams').textContent=r.teams||'—';
    document.getElementById('rbPrediction').textContent=(r.winner||'')+(r.score?' ('+r.score+')':'')||'—';
    document.getElementById('rbBet').textContent=r.bet||r.recommended_bet||'—';
    board.classList.add('show');
  }

  // ─── HELPERS ─────────────────────────────────────────────
  function setStatus(t) { document.getElementById('statusText').textContent=t; }
  function updCount() { document.getElementById('agentCountDisplay').textContent='AGENTS: '+agents.length; }
  function rand(min,max) { return Math.random()*(max-min)+min; }
  function randInt(min,max) { return Math.floor(rand(min,max+1)); }
  function pick(a) { return a[randInt(0,a.length-1)]; }

  // ─── LOOP ────────────────────────────────────────────────
  function upd() {
    frame++;
    agents.forEach(a=>a.upd());
    // Idle agents wander occasionally
    if(frame%180===0&&!isRunning) {
      let ag=pick(agents);
      if(!ag.mv&&Math.random()<.5) {
        let dirs=[[0,1],[0,-1],[1,0],[-1,0]];
        let d=pick(dirs);
        let nx=Math.floor(ag.x)+d[0], ny=Math.floor(ag.y)+d[1];
        if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&!A._occ(nx,ny,ag)) {
          ag.go(nx+.5,ny+.5);
          setTimeout(()=>{if(!ag.mv)ag.home();},2500);
        }
      }
    }
  }

  function drw() {
    cx.clearRect(0,0,W,H);
    drwFloor(); drwWalls();
    agents.forEach(a=>drwDesk(Math.floor(a.hx),Math.floor(a.hy)));
    drwDecor();
    [...agents].sort((a,b)=>a.y-b.y).forEach(a=>a.drw(cx));
    if(taskHist.length>0) {
      cx.fillStyle='rgba(0,0,0,0.5)'; cx.fillRect(4,ROWS*T-20,W-8,18);
      cx.fillStyle='#f0e68c'; cx.font='7px monospace'; cx.textAlign='left';
      let t=taskHist[taskHist.length-1];
      cx.fillText('▶ '+(t.length>40?t.substr(0,38)+'..':t),10,ROWS*T-8);
    }
    if(state&&state.phase&&state.phase!=='idle'&&state.phase!=='complete') {
      cx.fillStyle='#e94560'; cx.font='7px monospace'; cx.textAlign='right'; cx.fillText(state.phase.toUpperCase(),W-8,14);
    }
    let gr=cx.createRadialGradient(W/2,H/2,H*.5,W/2,H/2,H);
    gr.addColorStop(0,'rgba(0,0,0,0)'); gr.addColorStop(1,'rgba(0,0,0,0.18)');
    cx.fillStyle=gr; cx.fillRect(0,0,W,H);
  }

  function loop() { upd(); drw(); requestAnimationFrame(loop); }

  // ─── INIT ────────────────────────────────────────────────
  function init() {
    agents=AGENT_CFG.map((c,i)=>new A(c,i));
    updCount();

    document.getElementById('resultDismiss').addEventListener('click',()=>ro.classList.remove('show'));
    const inp=document.getElementById('taskInput'), btn=document.getElementById('sendBtn');
    function hdl() { if(isRunning) return; localDiscussion(inp.value); inp.value=''; }
    btn.addEventListener('click',hdl);
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')hdl();});

    // Auto demo after 8s idle
    if(taskHist.length===0){
      let demos=['Design new landing page','Fix payment gateway bug','Optimize database queries','Review pull request #42','Update API documentation'];
      setTimeout(()=>{if(!isRunning)localDiscussion(pick(demos));},8000);
    }

    // Poll remote state
    setInterval(pollSt,3000); pollSt();
    loop();
  }

  if(!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(r>w/2)r=w/2;if(r>h/2)r=h/2;this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x-r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this;};
  }

  document.addEventListener('DOMContentLoaded',init);
  if(document.readyState!=='loading') init();
})();
</script>
